<div class="manager-root">
  <div class="manager-layout">
    @if (isSidebarOpen) {
      <button
        type="button"
        class="mobile-overlay"
        (click)="closeSidebarOnMobile()"
        aria-label="Chiudi menu"
      ></button>
    }

    <aside
      class="manager-sidebar"
      [class.sidebar-open]="isSidebarOpen"
      [class.sidebar-closed]="!isSidebarOpen"
    >
      <div class="sidebar-head">
        <p class="sidebar-kicker">PKour Manager</p>
        <h1 class="sidebar-title">Manager</h1>
      </div>

      <nav class="sidebar-nav">
        @for (item of menuItems; track item.label) {
          @if (item.enabled) {
            <a
              [routerLink]="item.path"
              routerLinkActive="menu-item-active"
              class="menu-item"
              (click)="closeSidebarOnMobile()"
            >
              {{ item.label }}
            </a>
          } @else {
            <span class="menu-item menu-item-disabled">{{ item.label }}</span>
          }
        }
      </nav>
    </aside>

    <main class="manager-main">
      <div class="main-head">
        <div>
          <p class="main-kicker">Modulo attivo</p>
          <h2 class="main-title">{{ activeModuleTitle }}</h2>
        </div>
        <button
          type="button"
          class="menu-toggle"
          (click)="toggleSidebar()"
        >
          Menu
        </button>
      </div>

      <router-outlet />
    </main>
  </div>
</div>
