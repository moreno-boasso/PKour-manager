<div class="min-h-screen flex items-center justify-center bg-[var(--pk-bg)]">
  <div class="w-full max-w-sm px-6">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold tracking-widest text-[var(--pk-accent)] uppercase font-bebas">PKour</h1>
      <p class="text-[var(--pk-text-dim)] text-sm mt-1">Manager</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Username"
          autocomplete="username"
          class="w-full bg-[var(--pk-bg-2)] border border-[var(--pk-border)] rounded-lg px-4 py-3 text-[var(--pk-text)] placeholder-[var(--pk-text-dim)] focus:outline-none focus:border-[var(--pk-accent)] transition"
        />
      </div>
      <div>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          autocomplete="current-password"
          class="w-full bg-[var(--pk-bg-2)] border border-[var(--pk-border)] rounded-lg px-4 py-3 text-[var(--pk-text)] placeholder-[var(--pk-text-dim)] focus:outline-none focus:border-[var(--pk-accent)] transition"
        />
      </div>

      @if (error) {
        <p class="text-red-400 text-sm text-center">{{ error }}</p>
      }

      <button
        type="submit"
        [disabled]="loading || !username || !password"
        class="w-full bg-[var(--pk-accent)] hover:bg-[var(--pk-accent-bright)] disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition"
      >
        {{ loading ? 'Accesso in corso...' : 'Accedi' }}
      </button>
    </form>
  </div>
</div>
